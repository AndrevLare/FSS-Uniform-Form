<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resultado del pago — Uniformes</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --navy: #1b3a5c;
        --teal: #0d7f6e;
        --teal-lt: #e6f4f1;
        --red: #c0392b;
        --red-lt: #fdecea;
        --yellow: #b45309;
        --yellow-lt: #fef3c7;
        --bg: #eef2f7;
        --card: #ffffff;
        --border: #d0d9e4;
        --text: #1a2332;
        --muted: #5a6a7e;
      }

      body {
        font-family: "Nunito", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 32px 16px 60px;
      }

      .wrap {
        max-width: 500px;
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .icon-circle {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
        margin: 0 auto 8px;
      }
      .icon-circle.success { background: var(--teal-lt); }
      .icon-circle.error   { background: var(--red-lt); }
      .icon-circle.pending { background: var(--yellow-lt); }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 32px 24px;
        text-align: center;
      }

      .card h1 {
        font-size: 22px;
        font-weight: 700;
        color: var(--navy);
        margin-bottom: 10px;
      }

      .card p {
        font-size: 14px;
        color: var(--muted);
        line-height: 1.6;
      }

      .ref-box {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px 16px;
        margin-top: 20px;
        font-size: 13px;
        color: var(--muted);
      }
      .ref-box strong {
        display: block;
        font-size: 15px;
        color: var(--text);
        margin-top: 4px;
        letter-spacing: 0.03em;
      }

      .badge-status {
        display: inline-block;
        padding: 4px 14px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        margin-top: 16px;
      }
      .badge-status.success { background: var(--teal-lt); color: var(--teal); }
      .badge-status.error   { background: var(--red-lt);  color: var(--red);  }
      .badge-status.pending { background: var(--yellow-lt); color: var(--yellow); }

      .btn-back {
        display: block;
        text-align: center;
        background: var(--teal);
        color: #fff;
        border: none;
        border-radius: 12px;
        padding: 14px;
        font-size: 15px;
        font-weight: 700;
        font-family: "Nunito", sans-serif;
        text-decoration: none;
        transition: background 0.15s;
      }
      .btn-back:hover { background: #0a6b5c; }

      .nota {
        text-align: center;
        font-size: 12px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card" id="result-card">
        <div class="icon-circle" id="icon"></div>
        <h1 id="titulo"></h1>
        <p id="mensaje"></p>
        <span class="badge-status" id="badge"></span>
        <div class="ref-box" id="ref-box" style="display:none">
          Referencia del pedido
          <strong id="ref-value"></strong>
        </div>
      </div>

      <a href="index.html" class="btn-back">Volver al formulario</a>
      <p class="nota">Si tienes dudas, contacta a la institución educativa.</p>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const status = (params.get("status") || "").toUpperCase();
      const reference = params.get("reference") || "";

      const icon    = document.getElementById("icon");
      const titulo  = document.getElementById("titulo");
      const mensaje = document.getElementById("mensaje");
      const badge   = document.getElementById("badge");
      const refBox  = document.getElementById("ref-box");
      const refVal  = document.getElementById("ref-value");

      if (status === "APPROVED") {
        icon.textContent = "✅";
        icon.className = "icon-circle success";
        titulo.textContent = "¡Gracias por tu compra!";
        mensaje.textContent =
          "Tu pago fue procesado exitosamente. Pronto la institución educativa confirmará los detalles de tu pedido.";
        badge.textContent = "Pago aprobado";
        badge.className = "badge-status success";
      } else if (status === "DECLINED" || status === "VOIDED" || status === "ERROR") {
        icon.textContent = "❌";
        icon.className = "icon-circle error";
        titulo.textContent = "El pago no fue completado";
        mensaje.textContent =
          "Tu transacción fue rechazada o cancelada. Puedes intentarlo de nuevo con otro método de pago.";
        badge.textContent = "Pago rechazado";
        badge.className = "badge-status error";
      } else {
        icon.textContent = "⏳";
        icon.className = "icon-circle pending";
        titulo.textContent = "Pago en proceso";
        mensaje.textContent =
          "Tu pago está siendo verificado. Esto puede tardar unos minutos. Guarda tu referencia por si necesitas consultar el estado.";
        badge.textContent = "Pendiente";
        badge.className = "badge-status pending";
      }

      if (reference) {
        refBox.style.display = "block";
        refVal.textContent = reference;
      }
    </script>
  </body>
</html>
